                  - switch.z_tl_light_wc_vykliuchatel_2
                  - switch.z_tl_light_wc_vykliuchatel_3

# Освещение улица
- alias: "Включение ламп каждые 10 минут ночью"
  triggers:
    - trigger: time_pattern
      minutes: "/10" # Каждые 10 минут
  condition:
    condition: or
    conditions:
      - condition: sun
        after: sunset
        after_offset: "01:00:00" # 1 час после заката
      - condition: sun
        before: sunrise
        before_offset: "-01:00:00" # 1 час до восхода
  actions:
    - action: switch.turn_on
      target:
        entity_id: 
          - switch.light_str_west_switch_1
          - switch.light_str_north_switch_1

- alias: "Выключение ламп каждые 10 минут днем"
  triggers:
    - trigger: time_pattern
      minutes: "/10" # Каждые 10 минут
  condition:
    condition: and
    conditions:
      - condition: sun
        after: sunrise
        after_offset: "-01:00:00" # 1 час до восхода
      - condition: sun
        before: sunset
        before_offset: "01:00:00" # 1 час до заката
  actions:
    - action: switch.turn_off
      target:
        entity_id:
          - switch.light_str_west_switch_1
          - switch.light_str_north_switch_1