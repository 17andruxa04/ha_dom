
# Освещение СУ 2-этаж
- alias: Управление светом wc2
  triggers:
    # Триггер для включения света
    - trigger: state
      entity_id: binary_sensor.wf_tl_hum_det_wc2_dvizhenie
      to: "on"
    # Триггер для выключения света через 2 минуты после отсутствия движения
    - trigger: state
      entity_id: binary_sensor.wf_tl_hum_det_wc2_dvizhenie
      to: "off"
      for: "00:00:02"
  actions:
    - choose:
        # Действие для включения света
        - conditions:
            - condition: state
              entity_id: binary_sensor.wf_tl_hum_det_wc2_dvizhenie
              state: "on"
          sequence:
            - action: switch.turn_on
              target:
                entity_id:
                  - switch.z_tl_light_wc2_vykliuchatel_1
                  - switch.z_tl_light_wc2_vykliuchatel_2
        # Действие для выключения света
        - conditions:
            - condition: state
              entity_id: binary_sensor.wf_tl_hum_det_wc2_dvizhenie
              state: "off"
          sequence:
            - action: switch.turn_off
              target:
                entity_id:
                  - switch.z_tl_light_wc2_vykliuchatel_1
                  - switch.z_tl_light_wc2_vykliuchatel_2

# Освещение СУ 1-этаж
- alias: Управление светом wc
