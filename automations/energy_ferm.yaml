

# Сохранение счетчиков электрики за прошлый месяц ферма
- alias: Сохранение счетчиков электрики за прошлый месяц ферма
  triggers:
    - trigger: time
      at: "00:00:01"
      #это первое число месяца
  condition:
        condition: template
        value_template: "{{ now().day == 1 }}"
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.energy_count_day_farm_last_month
      data:
        value: "{{ states('sensor.energy_counter_farm_day') | float }}"
    # - action: input_number.set_value
    #   target:
    #     entity_id: input_number.energy_count_night_farm_last_month
    #   data:
    #     value: "{{ states('sensor.energy_counter_farm_night') | float }}"

# Сохранение счетчиков электрики за прошлый день ферма
- alias: Сохранение счетчиков электрики за прошлый день ферма
  triggers:
    - trigger: time
      at: "00:00:01"
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.energy_count_day_farm_last_day
      data:
        value: "{{ states('sensor.energy_counter_farm_day') | float }}"
