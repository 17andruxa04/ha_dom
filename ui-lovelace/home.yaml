# Полив газона
      - type: 'custom:button-card'
        entity: input_boolean.lawn_irrigation_manual
        name: Полив газона
        icon: mdi:water-pump
        color: auto
        styles:
          card:
            - background-color: >
                [[[
                  return entity.state === 'on' 
                    ? 'rgba(0, 128, 0, 0.8)' 
                    : 'rgba(0, 128, 0, 0.4)';
                ]]]
          name:
            - color: 'var(--primary-text-color)'
          state:
            - color: 'var(--primary-text-color)'
          custom_fields:
            timer:
              - font-size: 12px
              - color: 'var(--primary-text-color)'
              - margin-top: 4px

        show_state: true
        tap_action:
          action: toggle

        # Показываем таймер или "Выключен"
        custom_fields:
          timer: >
            [[[
              if (entity.state !== 'on') {
                return 'Выключен';
              }
              
              const state = states['input_number.lawn_irrigation_timer_value'].state;
              const seconds = parseInt(state, 10);
              if (isNaN(seconds)) return '—';

              const minutes = Math.floor(seconds / 60);
              const secs = seconds % 60;
              return `${minutes}:${secs.toString().padStart(2, '0')}`;
            ]]]

        triggers_update:
          - input_boolean.lawn_irrigation_manual
          - input_number.lawn_irrigation_timer_value


